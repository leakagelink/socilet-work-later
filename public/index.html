<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Socilet</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #0F172A; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      .wrap { display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; gap: 12px; }
      .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #3B82F6; border-radius: 50%; animation: spin 1s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script>
      // Capacitor will use server.url from capacitor.config.ts and load the live site.
      // This file is only a fallback when offline / before WebView takes over.
      setTimeout(function () {
        try { window.location.replace('https://socilet-work-later.lovable.app'); } catch (e) {}
      }, 1500);
    </script>
  </head>
  <body>
    <div class="wrap">
      <div class="spinner"></div>
      <div>Loading Socilet…</div>
    </div>
  </body>
</html>
